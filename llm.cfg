# HippoBridge LLM Subsystem Configuration
#
# Single backend: an existing OpenAI-compatible llama-server (a swap-router
# that loads whichever model is named in a request's "model" field on
# demand). No local model loading, no separate process — hipobridge.py
# talks to this server directly.
#
# Override any of this in local.cfg (not tracked by git), e.g.:
# [server]
# url = http://192.168.3.230:8080
# [models]
# instruct = LFM2.5-1.2b-Instruct

[server]
url = http://127.0.0.1:8080
grammar_mode = grammar_field
timeout = 30

[models]
# Model names exactly as registered on the server above — check with
# `python3 llm_cli.py doctor` or GET /v1/models on the server itself.
nano = LFM2.5-230M
micro = LFM2.5-350M
instruct = LFM2.5-1.2b-Instruct
thinking = LFM2.5-1.2b-Thinking

[pipeline]
comparison_tier = thinking
narration_max_sentences = 5
