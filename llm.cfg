# HippoBridge LLM Subsystem Configuration
#
# One or more OpenAI-compatible providers, one active at a time. Each
# provider exposes three model tiers used by the per-item "AI" buttons:
#   lite    — smallest/fastest (currently unwired)
#   default — clinical-record executive summaries (report, epicrisis)
#   medical — radiology triage, lab analysis, pre-exam brief
#
# Select the active provider with [llm] provider. Override any of this in
# local.cfg (not tracked by git), e.g. to point at a LAN LM Studio server:
#
#   [llm]
#   provider = lmstudio
#   [provider:lmstudio]
#   url = http://192.168.3.238:1234/v1
#   lite = LFM2.5-230M
#   default = LFM2-2.6B-Transcript
#   medical = medgemma-4b-it
#
# Model names must match the provider's own aliases exactly
# (check GET /v1/models on the server).

[llm]
provider = default
timeout = 60
# Language every AI summary is written in, regardless of the source
# document's language (e.g. English, Romanian, French).
language = English

[provider:default]
# Full OpenAI-compatible base url, including the /v1 suffix.
url = http://127.0.0.1:8080/v1
# Bearer token; leave empty when the server needs no auth.
key =
lite = LFM2.5-230M
default = LFM2-2.6B-Transcript
medical = medgemma-4b-it
