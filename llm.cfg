# HippoBridge LLM Subsystem Configuration
#
# Per-tier backend selection: each of the four LFM2.5 tiers (nano, micro,
# instruct, thinking) resolves independently to a "server" (existing
# llama.cpp server), "inprocess" (self-hosted llama-cpp-python) or "auto"
# backend at startup. A single llama-server process normally serves only
# ONE model, so "auto" only makes sense for a tier with a dedicated server;
# whenever the server multiplexes fewer than all tiers, pin the covered
# tier(s) explicitly to "server" and the rest to "inprocess" — do not rely
# on "auto" to figure out which model a shared server actually has loaded.
#
# Override any of this in local.cfg (not tracked by git), e.g.:
# [tier:instruct]
# server_url = http://192.168.3.230:8080
# server_model_name = lfm2.5-1.2b-instruct

[pipeline]
default_extraction_tier = instruct
comparison_tier = thinking
narration_max_sentences = 5
retry_on_validation_failure = true

[server]
# Host/port for `llm_cli.py serve` — distinct from hipobridge.py's own
# [server] section (separate file, separate process).
host = 0.0.0.0
port = 44661

[tier:nano]
backend = inprocess
server_url =
server_model_name =
server_grammar_mode = grammar_field
local_path = models/lfm2.5-230m-q8.gguf
n_ctx = 4096
n_threads = 4

[tier:micro]
backend = inprocess
server_url =
server_model_name =
server_grammar_mode = grammar_field
local_path = models/lfm2.5-350m-q8.gguf
n_ctx = 4096
n_threads = 4

[tier:instruct]
backend = auto
server_url = http://127.0.0.1:8080
server_model_name = lfm2.5-1.2b-instruct
server_grammar_mode = grammar_field
local_path = models/lfm2.5-1.2b-instruct-q5.gguf
n_ctx = 8192
n_threads = 8

[tier:thinking]
backend = inprocess
server_url =
server_model_name =
server_grammar_mode = grammar_field
local_path = models/lfm2.5-1.2b-thinking-q5.gguf
n_ctx = 8192
n_threads = 8
