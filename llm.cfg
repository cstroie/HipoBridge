# HippoBridge LLM Subsystem Configuration
#
# Single backend: an OpenAI-compatible server (LM Studio, or a llama-server
# swap-router that loads whichever model is named in a request's "model"
# field on demand). No local model loading, no separate process —
# hipobridge.py talks to this server directly.
#
# Override any of this in local.cfg (not tracked by git), e.g.:
# [server]
# url = http://192.168.3.230:8080
# [models]
# instruct = LFM2.5-1.2b-Instruct

[server]
url = http://192.168.3.238:1234
grammar_mode = response_format
timeout = 30

[models]
# medgemma-4b-it is the only model on this LM Studio server for now — all
# tiers point at it. Check with `python3 llm_cli.py doctor` or GET
# /v1/models on the server itself.
nano = medgemma-4b-it
micro = medgemma-4b-it
instruct = medgemma-4b-it
thinking = medgemma-4b-it

# --- LFM2.5 (previous default, kept for future deployments/experiments) ---
# [server]
# url = http://127.0.0.1:8080
# grammar_mode = grammar_field
# [models]
# nano = LFM2.5-230M
# micro = LFM2.5-350M
# instruct = LFM2.5-1.2b-Instruct
# thinking = LFM2.5-1.2b-Thinking

[pipeline]
comparison_tier = thinking
narration_max_sentences = 5
