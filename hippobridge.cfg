# HippoBridge Configuration File
# Configuration settings for the HippoBridge FHIR API gateway
#
# This file contains the main configuration for the HippoBridge application.
# You can override these settings by creating a local.cfg file with your custom values.
#
# Example local.cfg:
# [server]
# port = 8080
# 
# [hipocrate]
# service_url = http://your-hipocrate-server/hipocrate

[server]
# Server configuration
# host: IP address to bind to (0.0.0.0 for all interfaces)
# port: Port number for the HTTP server
host = 0.0.0.0
port = 44660

[hipocrate]
# Hipocrate service configuration
# service_url: Base URL of the Hipocrate medical system
#              This should point to the root directory of your Hipocrate installation
service_url = http://127.0.0.1/hipocrate

[cache]
# Persistent filesystem cache for Hipocrate HTML pages.
# Leave dir empty (the default) to disable persistent caching entirely.
# dir: absolute or relative path to the cache directory
# ttl: time-to-live for individual cache entries in seconds (default: 7 days)
# max_age_days: hard upper bound on cache file age in days; entries older than
#               this are deleted during cleanup even if not yet expired (0 = no
#               hard limit; default: 30)
dir =
ttl = 604800
max_age_days = 30

[radiology]
# Comma-separated list of HippoBridge usernames allowed to write radiology reports.
# Override in local.cfg: allowed_radiologists = dr.popescu, dr.ionescu
allowed_radiologists =

# The /api/ai/extract endpoint's server URL and per-tier model names are
# configured in llm.cfg (separate file, overridable via local.cfg there
# too) — not here.
